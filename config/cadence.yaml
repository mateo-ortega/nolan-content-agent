# config/cadence.yaml — calendario de producción y targets
# Leído por: Hermes scheduler (vía systemd timers que llaman skills/nolan-research)

timezone: America/Bogota

# Target de piezas aprobadas por semana (aprobadas, no producidas).
# Nolan ajusta producción para compensar rechazo estimado.
target_pieces_per_week:
  floor: 3
  target: 5
  ceiling: 7

# Mix por formato (porcentajes orientativos; Nolan puede ajustar por tema)
format_mix_weekly:
  carrusel: 0.30       # 30% — formato dominante por velocidad + densidad
  animacion: 0.20      # 20% — una matemática/física por semana típicamente
  voiceover_broll: 0.20 # 20% — uno con b-roll + TTS o guión para Mateo
  talking_head: 0.30   # 30% — guion para Mateo cuando amerita cara humana

# Mix por nicho (foco v1 — ver SAPIENS_BRAND_IDENTITY.md §Foco v1)
niche_mix_weekly:
  jovenes_preicfes: 0.15
  padres: 0.50
  adultos_ia: 0.20
  pymes: 0.10
  cruzado_l1_l2: 0.05  # piezas que cruzan audiencias (ej: "IA para estudiar")

# Schedule de scheduler (cron en zona Bogotá)
schedule:
  research_cycle:
    cron: "0 6 * * 1,3,5"         # L-W-V 6:00 AM
    description: "Ciclo de investigación + propuesta de temas"
  ethics_review:
    cron: "30 6 * * 1,3,5"        # 30 min después del research
    description: "Ethics gate sobre drafts generados del ciclo"
  telegram_digest:
    cron: "0 18 * * 0"            # Domingos 6 PM
    description: "Resumen semanal a Mateo con /stats + /budget"
  skill_review:
    cron: "0 9 * * *"             # Diario 9 AM
    description: "Cron skill_review_cron.sh — detecta auto-skills nuevas"
  apify_benchmark_ig:
    cron: "0 2 */2 * *"           # Cada 48h a las 2 AM
    description: "Scrape de 10 cuentas benchmark IG"
  apify_benchmark_tt:
    cron: "0 3 */3 * *"           # Cada 72h
    description: "Scrape TikTok benchmark"
  rss_poll:
    cron: "0 */4 * * *"           # Cada 4h
    description: "Polling de RSS oficiales"
  budget_report:
    cron: "0 9 * * 1"             # Lunes 9 AM
    description: "Reporte semanal de presupuesto"

# Ajustes dinámicos
auto_scale:
  scale_up_if:
    weekly_approval_rate_gte: 0.80
    current_target_lt_ceiling: true
    streak_weeks_required: 2
  scale_down_if:
    weekly_approval_rate_lt: 0.50
    streak_weeks_required: 1
  scale_down_action: "pause_and_switch_to_proposal_mode"
  # En modo propuesta: Nolan genera SOLO brief + caption para cada tema,
  # Mateo aprueba el brief por Telegram, solo entonces se produce la pieza.
  # Esto economiza gasto en producción hasta recalibrar SOUL.

# Ventanas horarias preferidas (metadata para Mateo al publicar, Nolan no publica)
publishing_windows_bogota:
  best:
    - "Mar 18:00-20:00"
    - "Jue 18:00-20:00"
    - "Sáb 10:00-12:00"
  fallback:
    - "Lun 12:00-14:00"
    - "Vie 17:00-19:00"

# Blackout days (no producir ni publicar)
blackout_dates:
  # Festivos colombianos grandes donde el engagement de nicho educativo cae:
  # - "2026-12-25"  # Navidad
  # - "2026-01-01"  # Año Nuevo
  # Por definir con Mateo si aplica.
