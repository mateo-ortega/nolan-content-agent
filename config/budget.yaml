# config/budget.yaml — pricing + umbrales de consumo LLM
# Leído por: skills/nolan-llm-router/scripts/budget_guard.py
#
# Actualizar manualmente una vez al mes con precios vigentes en OpenRouter.
# Fuente: https://openrouter.ai/models?o=pricing-low-to-high

monthly_budget_usd: 50.0

thresholds:
  warn: 0.70    # 70% → Telegram warn
  kill: 0.90    # 90% → kill-switch (solo review.* sobrevive)
  hard: 1.00    # 100% → hard stop (incluso review.* se pausa)

# Tarifas en USD por 1M tokens (M = 1,000,000)
# OpenRouter añade ~5% fee sobre el precio base del proveedor.
pricing:
  "anthropic/claude-sonnet-4.6":
    input_per_mtok:  3.00
    output_per_mtok: 15.00
    cache_read_per_mtok: 0.30
    cache_write_per_mtok: 3.75
    openrouter_fee_pct: 5.0
  "anthropic/claude-sonnet-4.5":
    input_per_mtok:  3.00
    output_per_mtok: 15.00
    cache_read_per_mtok: 0.30
    cache_write_per_mtok: 3.75
    openrouter_fee_pct: 5.0
  "deepseek/deepseek-chat":
    input_per_mtok:  0.27
    output_per_mtok: 1.10
    cache_read_per_mtok: 0.07
    openrouter_fee_pct: 5.0
  "deepseek/deepseek-v3":
    input_per_mtok:  0.27
    output_per_mtok: 1.10
    openrouter_fee_pct: 5.0
  "openai/gpt-4o-mini":
    input_per_mtok:  0.15
    output_per_mtok: 0.60
    openrouter_fee_pct: 5.0

# Perplexity (directa, fuera de OpenRouter)
perplexity_pricing:
  "sonar-pro":
    input_per_mtok:  3.00
    output_per_mtok: 15.00
    per_1k_searches: 5.00

# Rate limits por pieza (ejecutados en runtime por el router)
rate_limits:
  per_piece:
    max_calls_claude_sonnet: 2
    max_calls_deepseek: 8
    max_calls_perplexity: 1
  per_research_cycle:
    max_calls_deepseek: 40
    max_calls_perplexity: 5
  per_week:
    max_apify_runs: 20

# Presupuesto por categoría (soft cap, para monitoreo)
category_caps_usd:
  research: 15.0
  copy: 25.0
  ethics_reformulate: 5.0
  review_telegram: 3.0
  learning: 2.0

# Viabilidad proyectada ($50/mes target)
projected_monthly_cost_usd:
  research_deepseek: 1.5      # ~40 calls × 4 ciclos × $0.01
  copy_claude_cached: 2.0     # 20 piezas × $0.10 con cache hit
  perplexity_news: 1.5        # 30 days × 5 queries × $0.01
  telegram_replies: 0.5
  buffer_50pct: 2.75
  total_expected: 8.25
  # Nota: el riesgo real es loop runaway, no el uso normal. Kill-switch cubre.

logging:
  usage_jsonl: "logs/llm_usage.jsonl"
  # Cada call se escribe como:
  # {"ts": ..., "task": ..., "model": ..., "provider": ...,
  #  "in_tok": ..., "out_tok": ..., "cached_tok": ..., "cost_usd": ..., "piece_id": ...}
  rotate_mb: 50
  retain_days: 90
