# =============================================================================
# Perplexity — news IA + educación CO (directa, no OpenRouter)
# =============================================================================
perplexity:
  cadence_daily_queries: 5
  max_queries_per_cycle: 5
  recency_filter: week
  queries:
    - "últimas noticias IA educación Colombia"
    - "ICFES Saber 11 noticias Colombia"
    - "tendencias educación privada Colombia 2026"
    - "herramientas IA para estudiantes en español"
    - "hábitos de estudio investigación reciente"

# =============================================================================
# Google Trends Colombia (gratis vía pytrends)
# =============================================================================
google_trends:
  geo: "CO"
  cadence_hours: 24
  tracked_keywords:
    - "ICFES"
    - "Saber 11"
    - "mejores colegios Colombia"
    - "preicfes"
    - "cómo estudiar"
    - "lectura crítica"
    - "ChatGPT para estudiar"
    - "tareas con IA"
  related_queries: true
  rising_queries_alert_threshold: 5000  # % de aumento para destacar

# =============================================================================
# Source discovery (cron semanal — DeepSeek propone fuentes nuevas)
# =============================================================================
discovery:
  cadence_cron: "0 4 * * 1"   # Lunes 4 AM
  prompt_template: prompts/system/source_validator.md
  max_candidates_per_run: 10
  storage: memory/candidate_sources.sqlite
  # Flujo: DeepSeek propone → Mateo revisa por Telegram → aprobadas se agregan
  # a sources.yaml (commit manual o por /aprobar-fuente).

# =============================================================================
# Dedupe
# =============================================================================
dedupe:
  algorithm: "sha256(normalize(title) + canonical_url)"
  normalize:
    lowercase: true
    strip_accents: false
    strip_emojis: true
    strip_punctuation: true
    collapse_whitespace: true
  similarity_threshold: 0.85   # para clustering posterior con DeepSeek
