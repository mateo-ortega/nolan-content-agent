# config/sources.yaml — fuentes de investigación
# Leído por: skills/nolan-research/scripts/*.py
#
# Flujo: cada fuente produce señales → dedupe por hash_norm → trends.sqlite.
# Nuevas fuentes descubiertas por research.source_discovery quedan en
# candidate_sources.sqlite hasta que Mateo las apruebe con /aprobar-fuente.

# =============================================================================
# Apify — scraping IG/TikTok (pagos, ver budget)
# =============================================================================
apify:
  instagram_profile_scraper:
    actor_id: "apify/instagram-profile-scraper"
    cadence_hours: 48
    max_posts_per_run: 20
    benchmark_handles:
      # ── Autoridad / edtech LATAM ─────────────────────────────────────────
      - "andres.bilbao"        # Rappi founder — autoridad emprendimiento
      - "30x"                   # 30x brand — autoridad
      - "platzi"                # edtech referente LATAM
      - "freddyveganet"         # Freddy Vega — fundador Platzi
      - "soyhenry"              # Soy Henry — bootcamp
      - "coderhouse"            # Coderhouse — bootcamp
      - "freecodecamp"          # freeCodeCamp — valor técnico
      - "magicschoolai"         # MagicSchool AI — IA+edu show-don't-tell
      # ── Educación CO — nicho padres/preicfes ────────────────────────────
      - "preicfes.oficial"      # pre-ICFES Colombia — mismo nicho directo
      - "rutasaber"             # Ruta Saber — prep ICFES CO
      - "academico.co"          # Académico CO — refuerzo escolar
      # ── Ciencia del aprendizaje — feed tecnica_densa ────────────────────
      - "aliabdaal"             # Ali Abdaal — productividad + ciencia del aprendizaje
      - "andrewhuberman"        # Andrew Huberman — neurociencia (memoria, foco)
      - "khanacademy"           # Khan Academy — pedagogía basada en evidencia

  tiktok_profile_scraper:
    actor_id: "clockworks/tiktok-profile-scraper"
    cadence_hours: 72
    max_videos_per_run: 15
    benchmark_handles:
      - "platzi"
      - "30xbrand"
      - "magicschoolai"
      - "aliabdaal"             # Ali Abdaal — aprendizaje + productividad
      - "andrewhuberman"        # Huberman Lab — neurociencia del aprendizaje

  # Presupuesto Apify (tracked separado)
  budget_usd_per_month_cap: 10

