<!doctype html>
<html lang="es"><head><meta charset="utf-8"><title>sapiens · Comparative</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#111;}
  .slide{width:1080px;height:1350px;background:#FAFAF7;color:#1A1C23;position:relative;padding:96px 80px;box-sizing:border-box;display:flex;flex-direction:column;gap:56px;}
  .top{display:flex;align-items:center;justify-content:space-between;}
  .tag{font-family:'Jura',sans-serif;font-weight:600;font-size:22px;letter-spacing:0.14em;text-transform:uppercase;color:#6B6B6B;}
  .title{font-family:'Outfit',sans-serif;font-weight:700;font-size:72px;line-height:1;letter-spacing:-0.02em;color:#1A1C23;margin-top:24px;}
  .title .teal{color:#2B9E8F;}

  /* "antes/después" minimalista: dos columnas, UNA frase grande por lado, sin bullets */
  .compare{display:grid;grid-template-columns:1fr auto 1fr;gap:32px;align-items:center;flex:1;}
  .side{display:flex;flex-direction:column;gap:18px;}
  .side .label{font-family:'Jura',sans-serif;font-weight:700;font-size:22px;letter-spacing:0.18em;text-transform:uppercase;}
  .side.old .label{color:#9A9A9A;}
  .side.new .label{color:#2B9E8F;}
  .side .frase{font-family:'Outfit',sans-serif;font-weight:700;font-size:56px;line-height:1.0;letter-spacing:-0.02em;}
  .side.old .frase{color:#9A9A9A;text-decoration:line-through;text-decoration-color:rgba(232,93,93,0.55);text-decoration-thickness:4px;}
  .side.new .frase{color:#1A1C23;}
  .side.new .frase .teal{color:#2B9E8F;}
  .arrow{font-family:'Outfit',sans-serif;font-weight:700;font-size:64px;color:#2B9E8F;line-height:1;}

  /* body opcional: legible (28px) con matices secundarios, NO bullets densos */
  .body{font-family:'Instrument Sans',sans-serif;font-size:28px;line-height:1.45;color:#1A1C23;opacity:0.78;text-align:center;max-width:840px;margin:0 auto;}

  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
  .foot .left{display:flex;align-items:center;gap:16px;}
  .foot img{height:56px;width:auto;}
  .idx{font-family:'Geist Mono',monospace;font-size:22px;color:#6B6B6B;letter-spacing:0.08em;}
  .idx b{color:#E8A838;font-weight:600;}
</style></head>
<body>
<div class="slide">
  <div class="top">
    <div>
      <div class="tag" style="margin-bottom:16px;">Comparativa · 03 / 07</div>
      <div class="title">clase <span class="teal">estándar</span><br>vs. ruta <span class="teal">propia</span></div>
    </div>
  </div>
  <div class="compare">
    <div class="side old">
      <div class="label">escuela</div>
      <div class="frase">un ritmo<br>para todos.</div>
    </div>
    <div class="arrow">→</div>
    <div class="side new">
      <div class="label">sapiens</div>
      <div class="frase">un ritmo<br><span class="teal">por persona</span>.</div>
    </div>
  </div>
  <div class="body">la ruta se recalibra tras cada sesión.</div>
  <div class="foot">
    <div class="left"><img src="../assets/sapiens_icon_teal.svg"><span style="font-family:'Outfit',sans-serif;font-weight:700;font-size:28px;color:#2B9E8F;">sapiens</span></div>
    <div class="idx"><b>03</b> / 07</div>
  </div>
</div>
</body></html>
